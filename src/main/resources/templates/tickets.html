<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заявки | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Главная</a>
            <a class="nav-link active" href="/tickets">Заявки</a>
            <a class="nav-link" href="/about">О нас</a>
            <a class="nav-link" href="/contacts">Контакты</a>
        </div>
    </div>
</nav>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Список заявок</h1>
            <p class="text-muted mb-0">Данные загружаются из H2 Database.</p>
        </div>
        <span class="badge text-bg-secondary"
              th:text="${#lists.size(tickets)} + ' заявок'">4 заявки</span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Тема</th>
                        <th>Пользователь</th>
                        <th>Статус</th>
                        <th>Дата создания</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ticket : ${tickets}">
                        <td th:text="${ticket.id}">1</td>
                        <td>
                            <strong th:text="${ticket.title}">Тема</strong>
                            <div class="small text-muted"
                                 th:text="${ticket.description}">Описание</div>
                        </td>
                        <td th:text="${ticket.customerName}">Иван Иванов</td>
                        <td>
<span class="badge text-bg-secondary"
      th:text="${ticket.status}">NEW</span>
                        </td>
                        <td th:text="${ticket.createdAt}">2026-05-14T09:00</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
