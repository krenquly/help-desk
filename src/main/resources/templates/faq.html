<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">FAQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h1 th:text="${pageTitle}">Часто задаваемые вопросы</h1>

    <div th:each="item : ${faqItems}">
        <div class="card mb-3">
            <div class="card-header fw-bold" th:text="${item[0]}">Вопрос</div>
            <div class="card-body" th:text="${item[1]}">Ответ</div>
        </div>
    </div>

    <a class="btn btn-primary" th:href="@{/}">На главную</a>
</div>
</body>
</html>
